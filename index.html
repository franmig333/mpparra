<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MPPARRA | Enlaces</title>
  <style>
    body {
      background-color: #121212;
      font-family: 'Arial', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      margin: 0;
      color: #f4f4f4;
    }

    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-size: 24px;
      margin-bottom: 5px;
    }

    p {
      font-size: 16px;
      color: #b0b0b0;
      margin-bottom: 30px;
      text-align: center;
    }

    .links-container {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .link-btn {
      background-color: #2a2a2a;
      color: #fff;
      text-decoration: none;
      text-align: center;
      padding: 15px;
      border-radius: 8px;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }

    .link-btn:hover {
      background-color: #444;
    }
  </style>
</head>

<body>

  <img src="https://res.cloudinary.com/drpuhj6mc/image/upload/v1779039483/LOGO_rjejdk.jpg" alt="Logo MPPARRA"
    class="profile-img">

  <h1>MPPARRA</h1>
  <p>Diseño e Innovación</p>

  <div class="links-container">
    <a href="#" class="link-btn">Contactar por WhatsApp</a>
    <a href="#" class="link-btn">Ver Portafolio</a>
    <a href="#" class="link-btn">Síguenos en Instagram</a>
  </div>

</body>

</html>
